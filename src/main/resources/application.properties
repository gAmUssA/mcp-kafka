# MCP Server
quarkus.banner.enabled=false

# Transport: STDIO is disabled by default, HTTP is always available.
# Use -Dquarkus.profile=stdio (or QUARKUS_PROFILE=stdio) for STDIO transport (Claude Desktop, Claude Code CLI).
quarkus.mcp.server.stdio.enabled=false
%stdio.quarkus.mcp.server.stdio.enabled=true
%stdio.quarkus.http.host-enabled=false

# HTTP transport
quarkus.http.host=127.0.0.1
quarkus.http.port=8080
quarkus.mcp.server.http.root-path=/mcp

# CORS (required for MCP Streamable HTTP)
quarkus.http.cors.enabled=true

# Kafka Connection
kafka.bootstrap-servers=localhost:9092
kafka.security-protocol=PLAINTEXT
kafka.admin-timeout-seconds=30
kafka.default-lag-threshold=1000

# Schema Registry (optional)
# schema-registry.url=http://localhost:8081
# schema-registry.auth.username=
# schema-registry.auth.password=

# Flink SQL Gateway (optional)
# flink-sql-gateway.url=http://localhost:8083
# flink-sql-gateway.default-catalog=default_catalog
# flink-sql-gateway.default-database=default_database
# flink-sql-gateway.statement-timeout=30000
# flink-sql-gateway.max-rows=100

# Logging - colorful console output
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n
quarkus.log.level=INFO
quarkus.log.category."com.github.imcf.mcp.kafka".level=INFO
quarkus.log.category."com.github.imcf.mcp.kafka.tools".level=DEBUG
quarkus.log.category."com.github.imcf.mcp.kafka.client".level=DEBUG

# Dev mode: hot reload on source changes
%dev.quarkus.live-reload.instrumentation=true
%dev.quarkus.live-reload.watched-resources=application.properties

# Dev mode: verbose tool logging
%dev.quarkus.log.category."com.github.imcf.mcp.kafka.tools".level=DEBUG
%dev.quarkus.log.category."com.github.imcf.mcp.kafka.client".level=DEBUG
%dev.quarkus.log.category."io.quarkiverse.mcp".level=DEBUG
