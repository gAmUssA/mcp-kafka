# MCP Server - Default: STDIO transport
quarkus.banner.enabled=false

# Kafka Connection
kafka.bootstrap-servers=localhost:9092
kafka.security-protocol=PLAINTEXT

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.github.imcf.mcp.kafka".level=INFO

# HTTP profile: SSE + Streamable HTTP transport
%http.quarkus.http.host=127.0.0.1
%http.quarkus.http.port=8080
%http.quarkus.mcp.server.http.root-path=/mcp
%http.quarkus.banner.enabled=true
